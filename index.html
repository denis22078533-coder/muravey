<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumin Shop — Мой Магазин</title>
    <base href="/Lumin-platform/">
    <script src="https://tailwindcss.com"></script>
    <style>
        body { background: #f8fafc; font-family: sans-serif; }
        .card { transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
    </style>
</head>
<body>
    <!-- Шапка -->
    <header class="bg-indigo-600 text-white p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold italic">Lumin Store</h1>
            <nav>
                <a href="#" class="px-3 hover:underline">Главная</a>
                <a href="#" class="px-3 hover:underline">Каталог</a>
                <a href="#" class="px-3 bg-white text-indigo-600 rounded-full font-bold">Корзина: 0</a>
            </nav>
        </div>
    </header>

    <!-- Главный контент -->
    <main class="container mx-auto py-10 px-4">
        <h2 class="text-3xl font-bold text-gray-800 mb-8 text-center">Наши товары</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- Товар 1 -->
            <div class="card bg-white p-6 rounded-2xl shadow-md border border-gray-100 text-center">
                <div class="h-48 bg-gray-200 rounded-xl mb-4 flex items-center justify-center text-gray-400">Фото товара</div>
                <h3 class="text-xl font-semibold mb-2">Смартфон Lumin X</h3>
                <p class="text-indigo-600 font-bold text-2xl mb-4">59 990 ₽</p>
                <button class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 transition">В корзину</button>
            </div>

            <!-- Товар 2 -->
            <div class="card bg-white p-6 rounded-2xl shadow-md border border-gray-100 text-center">
                <div class="h-48 bg-gray-200 rounded-xl mb-4 flex items-center justify-center text-gray-400">Фото товара</div>
                <h3 class="text-xl font-semibold mb-2">Наушники Wave</h3>
                <p class="text-indigo-600 font-bold text-2xl mb-4">12 500 ₽</p>
                <button class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 transition">В корзину</button>
            </div>

            <!-- Товар 3 -->
            <div class="card bg-white p-6 rounded-2xl shadow-md border border-gray-100 text-center">
                <div class="h-48 bg-gray-200 rounded-xl mb-4 flex items-center justify-center text-gray-400">Фото товара</div>
                <h3 class="text-xl font-semibold mb-2">Смарт-часы Fit</h3>
                <p class="text-indigo-600 font-bold text-2xl mb-4">19 000 ₽</p>
                <button class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 transition">В корзину</button>
            </div>
        </div>
    </main>

    <footer class="text-center py-10 text-gray-500 text-sm">
        &copy; 2024 Lumin-platform. Создано с помощью ИИ.
    </footer>
</body>
</html>
