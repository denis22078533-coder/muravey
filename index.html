<!DOCTYPE html>
<html lang="ru">

<head>
  <base href="https://denis22078533-coder.github.io/lumin-platform/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Roboto:wght@400;500&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.11/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-react@0.462.0/dist/lucide-react.css">
    <style>
        * {
            border-color: #ffffff30;
        }

        body {
            background-color: rgba(0, 0, 0, 0.05);
            color: rgba(255, 255, 255, 0.87);
            font-family: 'Roboto', sans-serif;
            overflow-x: hidden;
        }

        h1,
        h2,
        h3,
        h4,
        h5 {
            font-family: 'Oswald', sans-serif;
            letter-spacing: 0.02em;
        }

        .font-oswald {
            font-family: 'Oswald', sans-serif;
        }

        .font-roboto {
            font-family: 'Roboto', sans-serif;
        }

        .live-pulse {
            animation: live-blink 1.5s ease-in-out infinite;
        }

        .card-hover {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(255, 90, 0, 0.15);
        }

        .nav-glow {
            box-shadow: 0 -1px 20px rgba(255, 90, 0, 0.08);
        }

        .feed-gradient {
            background: linear-gradient(180deg, transparent 0%, rgba(0, 0, 0, 0.85) 100%);
        }

        .fire-gradient {
            background: linear-gradient(135deg, #ff5a00 0%, #ff3d00 50%, #cc1a00 100%);
        }

        .dark-gradient {
            background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
        }

        .text-glow {
            text-shadow: 0 0 20px rgba(255, 90, 0, 0.5);
        }

        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        @keyframes live-blink {
            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        @keyframes fade-in {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slide-up {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            animation: fade-in 0.4s ease forwards;
        }

        .animate-slide-up {
            animation: slide-up 0.35s ease forwards;
        }

        .stagger-1 {
            animation-delay: 0.05s;
        }

        .stagger-2 {
            animation-delay: 0.1s;
        }

        .stagger-3 {
            animation-delay: 0.15s;
        }

        .stagger-4 {
            animation-delay: 0.2s;
        }

        .stagger-5 {
            animation-delay: 0.25s;
        }
    </style>
<style data-lumen-fix>
      html,body{background:#ffffff!important;color:#111111!important;}
    </style></head>
