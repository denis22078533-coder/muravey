<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кофейня</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            background-color: #fdfdfd;
            color: #333;
        }
        header {
            text-align: center;
            padding: 20px;
            background-color: #8b4513;
            color: white;
        }
        header h1 {
            margin: 0;
            font-size: 2.5rem;
        }
        .banner {
            width: 100%;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .menu-section {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .menu-card {
            flex: 1 1 calc(33.33% - 20px);
            max-width: calc(33.33% - 20px);
            background: #ffffff;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        .menu-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .menu-card .details {
            padding: 15px;
            text-align: center;
        }
        .menu-card .details h2 {
            font-size: 1.5rem;
            margin: 10px 0;
            color: #444;
        }
        .menu-card .details .price {
            color: #ff5555;
            font-size: 1rem;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <header>
        <h1>Кофейня</h1>
    </header>
    <div class="banner">
        <img src="https://cdn.poehali.dev/projects/4fe9d363-5216-44d6-8799-40a6f4aeed69/bucket/lumen-images/4b589d82-1b38-4cc4-a817-6a43847a3be7.jpg" alt="Главный баннер">
    </div>
    <section class="menu-section">
        <div class="menu-card">
            <img src="https://cdn.poehali.dev/projects/4fe9d363-5216-44d6-8799-40a6f4aeed69/bucket/lumen-images/7f9d786c-41cb-490c-833f-be92358c8323.jpg" alt="Кофе амаретто">
            <div class="details">
                <h2>Кофе Амаретто</h2>
                <p class="price">150 руб</p>
            </div>
        </div>
        <div class="menu-card">
            <img src="https://cdn.poehali.dev/projects/4fe9d363-5216-44d6-8799-40a6f4aeed69/bucket/lumen-images/289c2226-6f65-47fd-971f-e06d717a4b0e.jpg" alt="Капучино">
            <div class="details">
                <h2>Капучино</h2>
                <p class="price">120 руб</p>
            </div>
        </div>
        <div class="menu-card">
            <img src="https://cdn.poehali.dev/projects/4fe9d363-5216-44d6-8799-40a6f4aeed69/bucket/lumen-images/4b589d82-1b38-4cc4-a817-6a43847a3be7.jpg" alt="Эспрессо">
            <div class="details">
                <h2>Эспрессо</h2>
                <p class="price">100 руб</p>
            </div>
        </div>
    </section>
</body>
</html>
