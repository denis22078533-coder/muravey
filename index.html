<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Система управления для автосервиса</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-200 font-sans">
  <!-- Герой секция -->
  <div class="relative w-full h-[500px]">
    <img
      src="https://cdn.poehali.dev/projects/4fe9d363-5216-44d6-8799-40a6f4aeed69/bucket/lumen-images/66998774-f265-46c2-ae73-5571ba8bd289.jpg"
      alt="Автосервис: спортивная машина"
      style="object-fit: cover"
      class="absolute inset-0 w-full h-full"
    />
    <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-black opacity-70"></div>
    <div class="relative z-10 flex flex-col justify-center items-center h-full text-center">
      <h1 class="text-4xl md:text-5xl font-bold text-white">Автосервис премиум класса</h1>
      <p class="mt-4 text-lg text-gray-300">Ремонт и обслуживание элитных автомобилей</p>
    </div>
  </div>

  <!-- Галерея -->
  <div class="max-w-6xl mx-auto px-4 py-12">
    <h2 class="text-3xl font-bold text-center text-gray-200 mb-6">Наша фотогалерея</h2>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <div class="relative overflow-hidden rounded-xl shadow-lg">
        <img
          src="https://cdn.poehali.dev/projects/4fe9d363-5216-44d6-8799-40a6f4aeed69/bucket/lumen-images/06080de6-0cf9-4eb1-b4af-ab7c7636cccd.jpg"
          alt="Автомобиль в боксе"
          style="object-fit: cover"
          class="w-full h-56"
        />
      </div>
      <div class="relative overflow-hidden rounded-xl shadow-lg">
        <img
          src="https://cdn.poehali.dev/projects/4fe9d363-5216-44d6-8799-40a6f4aeed69/bucket/lumen-images/6a87af03-1651-45e6-9693-ac76fe19ccee.jpg"
          alt="Бокс автосервиса"
          style="object-fit: cover"
          class="w-full h-56"
        />
      </div>
      <div class="relative overflow-hidden rounded-xl shadow-lg">
        <img
          src="https://cdn.poehali.dev/projects/4fe9d363-5216-44d6-8799-40a6f4aeed69/bucket/lumen-images/6a87af03-1651-45e6-9693-ac76fe19ccee.jpg"
          alt="Ремонт спорткара"
          style="object-fit: cover"
          class="w-full h-56"
        />
      </div>
    </div>
  </div>
</body>
</html>
