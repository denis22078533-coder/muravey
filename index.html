<!DOCTYPE html>
<html lang="en">
<head>
    <base href="/Lumin-platform/">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    <title>Lumin Store</title>
    <meta name="description" content="Lumin Store — лучшие товары для вас с доставкой на дом!"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="font-roboto antialiased bg-gray-100">

<!-- Верх: Баннер -->
<div class="bg-yellow-400 text-center text-black text-lg font-bold py-2">
    Скидка 20% на все товары! Только сегодня!
</div>

<!-- Шапка -->
<header class="bg-blue-600 flex justify-between items-center text-white px-4 py-3">
    <h1 class="text-2xl font-bold">Lumin Store</h1>
    <div class="text-lg">
        Корзина: <span id="cart-count" class="font-semibold">0</span> товаров
    </div>
</header>

<!-- Товары -->
<main class="p-6 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4">
    <!-- Карточка товара -->
    <div class="bg-white shadow-md rounded-lg overflow-hidden">
        <img src="https://via.placeholder.com/150/FF0000/FFFFFF?text=Яблоки" alt="Яблоки" class="w-full h-32 object-cover">
        <div class="p-4">
            <h2 class="text-xl font-semibold">Яблоки</h2>
            <p class="text-gray-700">Сочные и свежие яблоки.</p>
            <button class="mt-4 bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 focus:outline-none">
                Добавить в корзину
            </button>
        </div>
    </div>

    <div class="bg-white shadow-md rounded-lg overflow-hidden">
        <img src="https://via.placeholder.com/150/FFA500/FFFFFF?text=Хлеб" alt="Хлеб" class="w-full h-32 object-cover">
        <div class="p-4">
            <h2 class="text-xl font-semibold">Хлеб</h2>
            <p class="text-gray-700">Мягкий и ароматный хлеб.</p>
            <button class="mt-4 bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 focus:outline-none">
                Добавить в корзину
            </button>
        </div>
    </div>

    <div class="bg-white shadow-md rounded-lg overflow-hidden">
        <img src="https://via.placeholder.com/150/0000FF/FFFFFF?text=Молоко" alt="Молоко" class="w-full h-32 object-cover">
        <div class="p-4">
            <h2 class="text-xl font-semibold">Молоко</h2>
            <p class="text-gray-700">Свежайшее молоко от фермеров.</p>
            <button class="mt-4 bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 focus:outline-none">
                Добавить в корзину
            </button>
        </div>
    </div>

    <div class="bg-white shadow-md rounded-lg overflow-hidden">
        <img src="https://via.placeholder.com/150/FFFF00/000000?text=Сыр" alt="Сыр" class="w-full h-32 object-cover">
        <div class="p-4">
            <h2 class="text-xl font-semibold">Сыр</h2>
            <p class="text-gray-700">Натуральный и вкусный сыр.</p>
            <button class="mt-4 bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 focus:outline-none">
                Добавить в корзину
            </button>
        </div>
    </div>
</main>

</body>
</html>
