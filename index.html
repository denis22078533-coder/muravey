<!DOCTYPE html>
<html lang="ru">
<head>
  <base href="https://denis22078533-coder.github.io/Lumin-platform/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фитнес-клуб «Тонус»</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            scroll-behavior: smooth;
        }

        .hero-image {
            height: 500px;
            object-fit: cover;
        }

        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .calendar td {
            padding: 10px;
            text-align: center;
            border: 1px solid #ddd;
            cursor: pointer;
        }
        .calendar td:hover {
            background-color: #f3f3f3;
        }
        .calendar th {
            padding: 10px;
            background-color: #f9fafb;
            border: 1px solid #ddd;
        }
        .slot {
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 4px;
            margin: 5px 0;
        }
        .slot:hover {
            background-color: #f3f3f3;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <!-- Hero Section -->
    <section class="relative">
        <img src="https://cdn.poehali.dev/projects/4fe9d363-5216-44d6-8799-40a6f4aeed69/bucket/lumen-images/79ecc9cf-0244-4c20-8eea-7d430310c9fd.jpg" alt="Фитнес-клуб Тонус" class="w-full hero-image">
        <div class="absolute inset-0 bg-black bg-opacity-50 flex flex-col justify-center text-center text-white">
            <h1 class="text-5xl md:text-7xl font-bold mb-4">Фитнес-клуб «Тонус»</h1>
            <p class="text-xl md:text-2xl font-medium mb-8">Тренируйтесь, достигайте целей, будьте здоровыми. Присоединяйтесь к нам!</p>
            <a href="#calendar" class="bg-yellow-500 text-black font-semibold px-8 py-4 rounded-full shadow-lg hover:bg-yellow-600 transition duration-300">Записаться</a>
        </div>
    </section>

    <!-- Calendar Section -->
    <section id="calendar" class="py-16 px-4">
        <div class="container mx-auto max-w-6xl text-center">
            <h2 class="text-4xl font-bold mb-6">Запишитесь на удобное время</h2>
            <p class="text-gray-600 mb-12">Выберите свободное время для ваших тренировок.</p>
            <div id="calendar-container" class="bg-white shadow-lg p-6 rounded-lg">
                <div id="calendar" class="calendar mb-6"></div>
                <div id="slots" class="text-left space-y-4"></div>
                <form id="booking-form" class="mt-4 hidden">
                    <input type="text" id="visitor-name" class="w-full mb-4 p-2 border rounded-lg" placeholder="Ваше имя" required />
                    <button type="submit" class="bg-yellow-500 text-black font-semibold px-8 py-4 rounded-full shadow-lg hover:bg-yellow-600 transition duration-300">Подтвердить запись</button>
                </form>
                <div id="confirmation" class="text-left hidden mt-6"></div>
            </div>
        </div>
    </section>

    <footer class="py-8 bg-gray-900 text-white text-center">
        <p>© 2023 Фитнес-клуб «Тонус». Все права защищены.</p>
    </footer>

    <script>
        const apiURL = '/api';

        const renderCalendar = async () => {
            const today = new Date();
            const year = today.getFullYear();
            const month = today.getMonth();

            const calendarElement = document.getElementById('calendar');
            let html = '<table class="calendar w-full"><thead><tr>';
            const days = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];
            days.forEach(day => (html += `<th>${day}</th>`));
            html += '</tr></thead><tbody>';

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            let date = 1;
            for (let i = 0; i < 6; i++) {
                html += '<tr>';
                for (let j = 0; j < 7; j++) {
                    if (i === 0 && j < (firstDay === 0 ? 6 : firstDay - 1)) {
                        html += `<td></td>`;
                    } else if (date <= daysInMonth) {
                        html += `<td data-date="${year}-${month + 1}-${date}">${date}</td>`;
                        date++;
                    } else {
                        html += `<td></td>`;
                    }
                }
                html += '</tr>';
            }
            html += '</tbody></table>';
            calendarElement.innerHTML = html;

            document.querySelectorAll('.calendar td[data-date]').forEach(cell => {
                cell.addEventListener('click', async (e) => {
                    const selectedDate = e.target.dataset.date;
                    await renderSlots(selectedDate);
                });
            });
        };

        const renderSlots = async (date) => {
            const slotsContainer = document.getElementById('slots');
            const form = document.getElementById('booking-form');
            const confirmation = document.getElementById('confirmation');
            slotsContainer.innerHTML = '';
            form.classList.add('hidden');
            confirmation.classList.add('hidden');

            const response = await fetch(`${apiURL}/appointments?date=${date}`);
            const slots = await response.json();

            if (slots.length === 0) {
                slotsContainer.innerHTML = '<p>На выбранную дату нет свободных мест.</p>';
            } else {
                slotsContainer.innerHTML = `<h3 class="text-2xl font-semibold mb-4">Доступные временные слоты на ${date}:</h3>`;
                slots.forEach(slot => {
                    const slotEl = document.createElement('div');
                    slotEl.className = 'slot bg-gray-100 text-black';
                    slotEl.textContent = slot.time_slot;
                    slotEl.addEventListener('click', () => { 
                        form.classList.remove('hidden');
                        document.getElementById('visitor-name').focus(); 
                        form.dataset.selectedDate = date;
                        form.dataset.selectedSlot = slot.time_slot;
                    });
                    slotsContainer.appendChild(slotEl);
                });
            }
        };

        document.getElementById('booking-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const form = e.target;
            const visitorName = document.getElementById('visitor-name').value;
            const data = {
                date: form.dataset.selectedDate,
                time_slot: form.dataset.selectedSlot,
                visitor_name: visitorName
            };

            const response = await fetch(`${apiURL}/appointments`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.status === 200) {
                const confirmation = document.getElementById('confirmation');
                confirmation.textContent = `Запись подтверждена на ${data.date}, ${data.time_slot}. Имя: ${data.visitor_name}.`;
                confirmation.classList.remove('hidden');
                form.classList.add('hidden');
            }
        });

        renderCalendar();
    </script>
</body>
</html>
