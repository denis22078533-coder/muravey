<!DOCTYPE html>
<html lang="en">
<head>
  <base href="https://denis22078533-coder.github.io/lumin-platform/">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Система управления для автосервиса</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lucide-react@0.462.0/dist/lucide-react.css">
<style data-lumen-fix>
      html,body{background:#ffffff!important;color:#111111!important;}
    </style></head>
<body class="bg-gray-900 text-gray-200 font-sans">
  <!-- Hero Section -->
  <div class="relative w-full h-[400px] md:h-[500px]">
    <img
      src="https://cdn.poehali.dev/projects/4fe9d363-5216-44d6-8799-40a6f4aeed69/bucket/lumen-images/2018e06e-6db6-4b08-8c6d-8cecc8bf8e7b.jpg"
      alt="Автосервис баннер"
      class="absolute inset-0 w-full h-full object-cover"
    />
    <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-black opacity-70"></div>
    <div class="relative z-10 flex flex-col justify-center items-center h-full text-center">
      <h1 class="text-4xl md:text-5xl font-bold text-white">Добро пожаловать в Автосервис Lumen</h1>
      <p class="mt-4 text-lg text-gray-300">Мы берем на себя заботу о вашем автомобиле</p>
    </div>
  </div>

  <div class="max-w-6xl mx-auto px-4 py-8">
    <!-- Таблица -->
    <div class="overflow-x-auto bg-gray-800 rounded-xl shadow-lg">
      <table class="w-full text-left border-collapse">
        <thead class="bg-gray-700">
          <tr>
            <th class="px-4 py-3 border-b font-bold text-gray-300">Марка машины</th>
            <th class="px-4 py-3 border-b font-bold text-gray-300">Госномер</th>
            <th class="px-4 py-3 border-b font-bold text-gray-300">Статус</th>
            <th class="px-4 py-3 border-b font-bold text-gray-300">Действия</th>
          </tr>
        </thead>
        <tbody>
          <tr class="hover:bg-gray-700 transition ease-in-out">
            <td class="px-4 py-3 text-gray-100">Toyota</td>
            <td class="px-4 py-3 text-gray-100">A123BC</td>
            <td class="px-4 py-3 flex items-center">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-yellow-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4"></path></svg>
              <span class="ml-2">В ремонте</span>
            </td>
            <td class="px-4 py-3">
              <button class="bg-gradient-to-r from-green-500 to-teal-500 text-white py-2 px-4 rounded-lg shadow-md hover:opacity-90 transition">
                Детали
              </button>
            </td>
          </tr>
          <tr class="hover:bg-gray-700 transition ease-in-out">
            <td class="px-4 py-3 text-gray-100">BMW</td>
            <td class="px-4 py-3 text-gray-100">B456DE</td>
            <td class="px-4 py-3 flex items-center">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4"></path></svg>
              <span class="ml-2">Готово</span>
            </td>
            <td class="px-4 py-3">
              <button class="bg-gradient-to-r from-green-500 to-teal-500 text-white py-2 px-4 rounded-lg shadow-md hover:opacity-90 transition">
                Детали
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Галерея -->
    <h2 class="text-2xl font-bold text-gray-200 mt-12 mb-4">Галерея лучших машин в сервисе</h2>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <div class="overflow-hidden rounded-xl shadow-lg">
        <img
          src="https://cdn.poehali.dev/projects/4fe9d363-5216-44d6-8799-40a6f4aeed69/bucket/lumen-images/4b2116c4-522e-4ee9-a34a-b4ffbc3a1fb6.jpg"
          alt="Крутая машина"
          style="object-fit: cover"
          class="w-full h-56"
        />
      </div>
      <div class="overflow-hidden rounded-xl shadow-lg">
        <img
          src="https://cdn.poehali.dev/projects/4fe9d363-5216-44d6-8799-40a6f4aeed69/bucket/lumen-images/6f8135ef-fee5-4626-9493-9bb7af29bbe2.jpg"
          alt="Крутая машина"
          style="object-fit: cover"
          class="w-full h-56"
        />
      </div>
      <div class="overflow-hidden rounded-xl shadow-lg">
        <img
          src="https://cdn.poehali.dev/projects/4fe9d363-5216-44d6-8799-40a6f4aeed69/bucket/lumen-images/2018e06e-6db6-4b08-8c6d-8cecc8bf8e7b.jpg"
          alt="Крутая машина"
          style="object-fit: cover"
          class="w-full h-56"
        />
      </div>
    </div>
  </div>
</body>
</html>
